<!DOCTYPE html>

<html class="dark" dir="rtl" lang="ar"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>تسجيل الدخول | GlobalTrack</title>
<!-- Tailwind CSS with Plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts: Inter -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#3c83f6', // custom_color
            surface: '#111827', // dark blue background
            card: '#1f2937',    // dark surface
          },
          fontFamily: {
            sans: ['Inter', 'Tahoma', 'Arial', 'sans-serif'],
          },
          borderRadius: {
            'custom': '8px', // ROUND_EIGHT
          }
        }
      }
    }
  </script>
<style data-purpose="custom-typography">
    body {
      font-family: 'Inter', 'Tahoma', 'Arial', sans-serif;
    }
    /* Simple animation for the login card */
    .fade-in {
      animation: fadeIn 0.5s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="bg-surface text-gray-100 min-h-screen flex items-center justify-center p-4">
<!-- BEGIN: MainContainer -->
<main class="w-full max-w-md" data-purpose="login-container">
<!-- BEGIN: BrandLogo -->
<div class="text-center mb-8 fade-in" data-purpose="branding">
<div class="flex items-center justify-center mb-4">
<!-- SVG Logo Representation -->
<div class="w-12 h-12 bg-primary rounded-custom flex items-center justify-center shadow-lg shadow-primary/20">
<svg class="h-8 w-8 text-white" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M9 20l-5.447-2.724A2 2 0 013 15.488V5.512a2 2 0 011.553-1.954L9 2l5 2.5V11l-5-2.5V20zm0 0l5 2.5 5.447-2.724A2 2 0 0021 17.488V7.512a2 2 0 00-1.553-1.954L14 3v11l-5-2.5z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
</div>
<h1 class="text-3xl font-bold tracking-tight text-white">GlobalTrack</h1>
<p class="mt-2 text-gray-400">مرحباً بك مجدداً، يرجى تسجيل الدخول</p>
</div>
<!-- END: BrandLogo -->
<!-- BEGIN: LoginCard -->
<div class="bg-card border border-gray-700/50 p-8 rounded-custom shadow-2xl fade-in" data-purpose="login-card">
<form action="#" class="space-y-6" method="POST">
<!-- Email Input Group -->
<div class="space-y-2">
<label class="block text-sm font-medium text-gray-300" for="email">البريد الإلكتروني</label>
<div class="relative">
<input class="w-full bg-gray-900 border-gray-700 text-white rounded-custom py-3 px-4 focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none" id="email" name="email" placeholder="name@example.com" required="" type="email"/>
</div>
</div>
<!-- Password Input Group -->
<div class="space-y-2">
<div class="flex items-center justify-between">
<label class="block text-sm font-medium text-gray-300" for="password">كلمة المرور</label>
<a class="text-sm text-primary hover:underline transition-all" href="#">نسيت كلمة المرور؟</a>
</div>
<div class="relative">
<input class="w-full bg-gray-900 border-gray-700 text-white rounded-custom py-3 px-4 focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Remember Me Checkbox -->
<div class="flex items-center">
<input class="h-4 w-4 text-primary focus:ring-primary border-gray-700 rounded bg-gray-900" id="remember-me" name="remember-me" type="checkbox"/>
<label class="mr-2 block text-sm text-gray-400" for="remember-me">تذكرني على هذا الجهاز</label>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary hover:bg-blue-600 text-white font-semibold py-3 px-4 rounded-custom transition-colors duration-200 shadow-lg shadow-primary/30 flex items-center justify-center space-x-2" type="submit">
<span>دخول</span>
<svg class="h-5 w-5 mr-2" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
</form>
<!-- BEGIN: SocialLogin -->
<div class="mt-8">
<div class="relative">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-gray-700"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-2 bg-card text-gray-500 uppercase">أو عبر</span>
</div>
</div>
<div class="mt-6 grid grid-cols-1 gap-3">
<button class="w-full flex justify-center items-center py-2.5 px-4 border border-gray-700 rounded-custom shadow-sm bg-gray-800 text-sm font-medium text-gray-300 hover:bg-gray-700 transition-colors" type="button">
<svg class="h-5 w-5 ml-2" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="currentColor"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="currentColor"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="currentColor"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="currentColor"></path>
</svg>
<span>تسجيل الدخول بواسطة Google</span>
</button>
</div>
</div>
<!-- END: SocialLogin -->
</div>
<!-- END: LoginCard -->
<!-- Footer Links -->
<div class="mt-8 text-center" data-purpose="footer-links">
<p class="text-sm text-gray-500">
        ليس لديك حساب؟ 
        <a class="font-medium text-primary hover:underline" href="#">أنشئ حساباً جديداً</a>
</p>
</div>
</main>
<!-- END: MainContainer -->
<script data-purpose="ui-interactions">
    // Placeholder for simple interaction logic
    document.querySelector('form').addEventListener('submit', (e) => {
      // In a real app, this would handle the login logic
      console.log('Login attempt...');
    });
  </script>
</body></html>
