<header class="flex items-center px-6 md:px-10 border-b transition-colors"
        style="height: 64px; background: var(--bg-secondary); border-color: var(--border-color); box-shadow: var(--nav-shadow);">

  <!-- Mobile Menu Toggle -->
  <button (click)="onToggleMenu()"
          id="btn-mobile-menu"
          class="lg:hidden me-5 flex items-center justify-center rounded-xl transition-all duration-200 border"
          style="width: 40px; height: 40px; background: var(--bg-tertiary); border-color: var(--border-color); color: var(--color-raqeeb-azure);"
          aria-label="Toggle menu">
    <i class="pi pi-bars text-base"></i>
  </button>

  <!-- Page Context -->
  <div class="flex-1 hidden sm:block">
    <h2 class="text-base font-black tracking-tighter uppercase"
        style="font-family: var(--font-display); color: var(--text-primary); line-height: 1;">
      {{ 'APP_NAME' | translate }}
    </h2>
    <p class="flex items-center gap-2 mt-0.5">
      <span class="status-dot active"></span>
      <span class="text-[9px] font-mono uppercase tracking-[0.4em]"
            style="color: var(--color-raqeeb-azure); opacity: 0.7;">
        {{ today | date:'EEE, dd MMM yyyy' }} &bull; {{ today | date:'HH:mm' }}
      </span>
    </p>
  </div>

  <!-- Right Controls -->
  <div class="flex items-center gap-2 ms-auto">

    <!-- Search Bar -->
    <div class="hidden xl:flex items-center rounded-xl px-4 py-2 w-72 gap-3 transition-all duration-200 border"
         style="background: var(--bg-primary); border-color: var(--border-color);"
         id="search-bar">
      <i class="pi pi-search text-xs flex-shrink-0" style="color: var(--text-muted);"></i>
      <input type="search"
             placeholder="{{ 'NAVBAR.SEARCH' | translate }}"
             class="bg-transparent text-[11px] font-mono outline-none w-full placeholder:opacity-40 tracking-wide"
             style="color: var(--text-primary);"
             aria-label="Search">
    </div>

    <!-- Language Toggle -->
    <button (click)="languageService.toggleLanguage()"
            id="btn-language"
            class="flex items-center justify-center rounded-xl transition-all duration-200 border font-mono text-[9px] font-black"
            style="width: 40px; height: 40px; background: var(--bg-primary); border-color: var(--border-color); color: var(--text-secondary);"
            [title]="languageService.currentLang() === 'ar' ? 'Switch to English' : 'التبديل للعربية'">
      {{ languageService.currentLang() === 'ar' ? 'EN' : 'AR' }}
    </button>

    <!-- Theme Toggle -->
    <button (click)="themeService.toggleTheme()"
            id="btn-theme"
            class="flex items-center justify-center rounded-xl transition-all duration-200 border"
            style="width: 40px; height: 40px; background: var(--bg-primary); border-color: var(--border-color); color: var(--text-secondary);"
            [title]="themeService.theme() === 'dark' ? 'Light mode' : 'Dark mode'">
      <i [class]="'pi text-sm ' + (themeService.theme() === 'dark' ? 'pi-sun' : 'pi-moon')"></i>
    </button>

    <!-- User Info -->
    <div class="flex items-center gap-3 ps-4 border-s ms-2"
         style="border-color: var(--border-color);">
      <div class="hidden md:flex flex-col items-end">
        <span class="text-[11px] font-black tracking-tighter uppercase"
              style="color: var(--text-primary);">
          {{ authService.$user()?.name }}
        </span>
        <span class="text-[8px] font-mono uppercase tracking-widest"
              style="color: var(--color-raqeeb-azure); opacity: 0.7;">
          {{ authService.$user()?.role }}
        </span>
      </div>
      <div class="rounded-xl overflow-hidden flex items-center justify-center"
           style="width: 36px; height: 36px; background: var(--bg-primary); border: 1px solid var(--border-color);">
        <img [src]="'https://ui-avatars.com/api/?name=' + (authService.$user()?.name || 'User') + '&background=00F2FF&color=0A0E23&bold=true&size=72'"
             class="w-full h-full object-cover"
             [alt]="authService.$user()?.name || 'User'">
      </div>
    </div>

  </div>
</header>
