<div class="min-h-screen bg-[var(--bg-primary)] flex items-center justify-center p-6 relative overflow-hidden transition-colors duration-300">
  <!-- Static Grid Background -->
  <div class="absolute inset-0 opacity-10 pointer-events-none transition-opacity duration-500">
      <div class="absolute top-0 left-0 w-full h-full bg-[linear-gradient(var(--grid-color)_1.5px,transparent_1.5px),linear-gradient(90deg,var(--grid-color)_1.5px,transparent_1.5px)] bg-[size:100px_100px]"></div>
  </div>

  <!-- Decorative Corner Brackets -->
  <div class="absolute top-10 left-10 w-20 h-20 border-t-2 border-l-2 border-raqeeb-azure/20 transition-all duration-500 hover:border-raqeeb-azure/40 hidden md:block"></div>
  <div class="absolute bottom-10 right-10 w-20 h-20 border-b-2 border-r-2 border-raqeeb-azure/20 transition-all duration-500 hover:border-raqeeb-azure/40 hidden md:block"></div>

  <div class="w-full max-w-[520px] relative z-10 animate-fade-up">
    <!-- Main Command Terminal -->
    <div class="tactical-border p-10 md:p-16 rounded-[var(--card-radius)] relative overflow-hidden transition-colors duration-300" 
         style="background: var(--bg-secondary); box-shadow: var(--card-shadow);">
      
      <!-- Logo and Access Header -->
      <div class="mb-14 flex flex-col items-center">
        <div class="mb-6 relative transition-transform duration-300 hover:scale-105">
           <app-logo [text]="'APP_NAME' | translate" [isInverse]="themeService.theme() === 'dark'"></app-logo>
        </div>
        <div class="text-center space-y-4">
           <h2 class="text-4xl font-black tracking-widest uppercase select-none transition-colors duration-300"
               style="font-family: var(--font-display); color: var(--text-primary);">
             {{ 'LOGIN.ACCESS_PORTAL' | translate }}
           </h2>
           <div class="flex items-center justify-center gap-3 transition-colors duration-300" style="color: var(--text-secondary);">
              <span class="h-[1px] w-8 bg-raqeeb-azure/30"></span>
              <span class="text-[9px] font-mono uppercase tracking-[0.5em] flex items-center gap-2">
                <span class="status-dot active"></span>
                {{ 'LOGIN.ENCRYPTION_ACTIVE' | translate }}
              </span>
              <span class="h-[1px] w-8 bg-raqeeb-azure/30"></span>
           </div>
        </div>
      </div>
      
      <!-- System Form -->
      <form (submit)="login()" class="w-full space-y-8 stagger-children">
        <!-- Sector: Identification -->
        <div class="space-y-3 animate-fade-up">
          <label class="text-[9px] font-mono font-bold text-raqeeb-azure uppercase tracking-[0.4em] px-2 border-l-2 border-raqeeb-azure/50 ms-2 transition-colors duration-300">
            {{ 'LOGIN.USER_ID' | translate }}
          </label>
          <div class="relative group">
            <div class="absolute start-5 top-1/2 -translate-y-1/2 transition-colors duration-300" style="color: var(--text-muted);">
               <i class="pi pi-shield text-xs group-focus-within:text-raqeeb-azure transition-colors duration-300"></i>
            </div>
            <input type="text" [(ngModel)]="credentials.username" name="username" [placeholder]="'LOGIN.USERNAME_PH' | translate"
                   class="w-full border ps-14 pe-6 py-4 rounded-xl focus:outline-none transition-all duration-300 font-mono text-sm tracking-wider placeholder-opacity-50"
                   style="background: var(--bg-primary); border-color: var(--border-color); color: var(--text-primary);"
                   onfocus="this.style.borderColor='var(--color-raqeeb-azure)'; this.style.boxShadow='0 0 0 3px rgba(0,242,255,0.1)'"
                   onblur="this.style.borderColor='var(--border-color)'; this.style.boxShadow='none'">
          </div>
        </div>
        
        <!-- Sector: Verification -->
        <div class="space-y-3 animate-fade-up">
          <label class="text-[9px] font-mono font-bold text-raqeeb-azure uppercase tracking-[0.4em] px-2 border-l-2 border-raqeeb-azure/50 ms-2 transition-colors duration-300">
            {{ 'LOGIN.PASSCODE' | translate }}
          </label>
          <div class="relative group">
            <div class="absolute start-5 top-1/2 -translate-y-1/2 transition-colors duration-300" style="color: var(--text-muted);">
               <i class="pi pi-lock text-xs group-focus-within:text-raqeeb-azure transition-colors duration-300"></i>
            </div>
            <input type="password" [(ngModel)]="credentials.password" name="password" placeholder="••••••••••••"
                   class="w-full border ps-14 pe-6 py-4 rounded-xl focus:outline-none transition-all duration-300 font-mono text-sm tracking-widest placeholder-opacity-50"
                   style="background: var(--bg-primary); border-color: var(--border-color); color: var(--text-primary);"
                   onfocus="this.style.borderColor='var(--color-raqeeb-azure)'; this.style.boxShadow='0 0 0 3px rgba(0,242,255,0.1)'"
                   onblur="this.style.borderColor='var(--border-color)'; this.style.boxShadow='none'">
          </div>
        </div>

        <!-- Initiate Sequence -->
        <div class="pt-8 animate-fade-up">
          <button type="submit" 
                  class="w-full py-5 font-black rounded-xl border transition-all duration-300 text-xs tracking-[0.6em] uppercase relative overflow-hidden group/btn"
                  style="background: var(--color-raqeeb-azure); color: var(--color-raqeeb-navy); border-color: var(--color-raqeeb-azure); box-shadow: 0 10px 30px rgba(0,242,255,0.2);"
                  onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 15px 35px rgba(0,242,255,0.3)'"
                  onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 10px 30px rgba(0,242,255,0.2)'">
            {{ 'LOGIN.BTN' | translate }}
          </button>
        </div>

        <!-- System Auxiliaries -->
        <div class="flex flex-col items-center gap-4 mt-8 pt-8 border-t transition-colors duration-300 animate-fade-up" style="border-color: var(--border-color);">
           <button type="button" class="text-[9px] font-mono uppercase tracking-widest transition-colors duration-300"
                   style="color: var(--text-secondary);"
                   onmouseover="this.style.color='var(--color-raqeeb-azure)'"
                   onmouseout="this.style.color='var(--text-secondary)'">
             {{ 'LOGIN.FORGOT_LINK' | translate }}
           </button>
           <p class="text-[8px] font-mono opacity-50 uppercase tracking-[0.4em] italic transition-colors duration-300" style="color: var(--text-secondary);">
             {{ 'LOGIN.AUTHORIZED' | translate }}
           </p>
        </div>
      </form>
    </div>
  </div>
  
  <!-- Massive Telemetry Text -->
  <div class="absolute bottom-16 -end-10 font-display text-[15rem] leading-none pointer-events-none select-none italic tracking-tighter opacity-5 transition-opacity duration-300"
       style="color: var(--color-raqeeb-azure);">
    RBQX
  </div>
  
  <!-- System Diagnostic Panel -->
  <div class="absolute top-16 start-16 hidden xl:block animate-fade-in" style="animation-delay: 500ms;">
     <div class="tactical-border p-8 rounded-xl w-64 transition-colors duration-300" style="background: var(--bg-secondary);">
        <div class="flex flex-col gap-6">
           <div class="flex items-center justify-between">
              <span class="text-[9px] font-mono uppercase tracking-widest transition-colors duration-300" style="color: var(--text-secondary);">
                {{ 'LOGIN.SYSTEM_INTEGRITY' | translate }}
              </span>
              <span class="status-dot active"></span>
           </div>
           <div class="space-y-3">
              <div class="h-1.5 w-full rounded-full overflow-hidden transition-colors duration-300" style="background: var(--border-color);">
                 <div class="h-full w-[88%] rounded-full transition-all duration-1000" style="background: var(--color-raqeeb-azure);"></div>
              </div>
              <div class="flex justify-between font-mono text-[8px] tracking-tighter transition-colors duration-300" style="color: var(--text-secondary);">
                 <span class="uppercase tracking-widest">{{ 'LOGIN.SEC_LOAD' | translate }}</span>
                 <span class="text-raqeeb-azure font-bold">0x8F_AUTH</span>
              </div>
           </div>
           <p class="text-[8px] font-mono uppercase tracking-widest mt-2 transition-colors duration-300" style="color: var(--color-raqeeb-azure); opacity: 0.8;">
             {{ 'LOGIN.PROTOCOL' | translate }}
           </p>
        </div>
     </div>
  </div>
</div>
