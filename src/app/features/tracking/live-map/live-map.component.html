<div class="h-[calc(100vh-14rem)] flex flex-col gap-8 animate-in fade-in slide-in-from-bottom-4 duration-1000">
  <header class="flex flex-col md:flex-row md:items-center justify-between gap-8 py-2">
    <div>
       <span class="text-raqeeb-azure font-black text-xs tracking-[0.4em] uppercase opacity-60">Operations Intelligence</span>
       <h2 class="text-4xl md:text-5xl font-black text-raqeeb-navy mt-2 tracking-tighter">Live Node Tracking</h2>
    </div>
    <div class="flex gap-4 self-start">
       <button class="bg-white border-2 border-slate-100 text-raqeeb-navy px-8 py-4 rounded-[1.5rem] text-xs font-black uppercase tracking-widest hover:bg-slate-50 shadow-sm transition-all flex items-center gap-3">
          <i class="pi pi-filter text-raqeeb-azure"></i>
          Grid Filter
       </button>
       <button class="bg-raqeeb-navy text-white px-10 py-4 rounded-[1.5rem] text-xs font-black uppercase tracking-widest shadow-2xl shadow-raqeeb-navy/30 hover:-translate-y-1 transition-all">
          Deploy Layer
       </button>
    </div>
  </header>

  <div class="flex-1 rounded-[3.5rem] bg-slate-200 shadow-2xl border-8 border-white overflow-hidden relative group">
    <!-- Leaflet Placeholder -->
    <div class="absolute inset-0 bg-[#f8fafc] flex items-center justify-center">
       <div class="absolute inset-0 opacity-10 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] animate-pulse"></div>
       <div class="text-center relative z-10 px-6">
          <div class="w-24 h-24 bg-raqeeb-navy rounded-[2.5rem] flex items-center justify-center mx-auto mb-8 shadow-2xl group-hover:scale-110 transition-transform duration-700">
             <i class="pi pi-map text-4xl text-raqeeb-azure"></i>
          </div>
          <h3 class="text-2xl font-black text-raqeeb-navy tracking-tight uppercase">Cartography Engine Initializing</h3>
          <p class="text-raqeeb-slate text-sm font-medium mt-3 italic tracking-widest uppercase mb-8">Loading Global Vector Tiles & Node Coordinates...</p>
          <div class="max-w-xs mx-auto h-2 bg-slate-100 rounded-full p-0.5 overflow-hidden shadow-inner">
             <div class="h-full bg-raqeeb-azure rounded-full animate-progress" style="width: 65%"></div>
          </div>
       </div>
    </div>

    <!-- Map UI Overlay -->
    <div class="absolute top-10 left-10 z-20 hidden md:flex flex-col gap-4">
       <div class="glass-effect p-6 rounded-[2.5rem] shadow-2xl border border-white/20 w-72">
          <h4 class="text-xs font-black text-raqeeb-navy uppercase tracking-[0.3em] mb-6 flex items-center justify-between">
             Active Sectors
             <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
          </h4>
          <div class="space-y-4">
             @for (zone of zones(); track zone.id) {
               <div class="flex items-center justify-between p-3 bg-slate-50/50 rounded-2xl hover:bg-white transition-all cursor-pointer border border-transparent hover:border-raqeeb-azure/20 group/zone">
                  <div class="flex items-center gap-3">
                     <span class="text-xs font-black text-raqeeb-navy tracking-tighter">{{ zone.name }}</span>
                  </div>
                  <span class="text-[10px] font-black text-raqeeb-azure bg-blue-50 px-3 py-1 rounded-lg group-hover/zone:scale-110 transition-transform">{{ zone.workers }} Nodes</span>
               </div>
             }
          </div>
       </div>

       <div class="glass-effect p-6 rounded-3xl shadow-xl w-72">
          <div class="flex items-center gap-4">
             <div class="w-12 h-12 bg-raqeeb-navy rounded-2xl flex items-center justify-center text-white ring-4 ring-raqeeb-navy/5">MA</div>
             <div>
                <span class="text-[9px] font-black text-raqeeb-slate uppercase tracking-widest block">My Signal</span>
                <span class="text-xs font-black text-raqeeb-navy uppercase">Marcus Aurelius</span>
             </div>
          </div>
       </div>
    </div>

    <div class="absolute bottom-10 inset-x-10 z-20 flex flex-col md:flex-row justify-between items-center gap-6">
       <div class="bg-raqeeb-navy px-8 py-4 rounded-2xl text-white shadow-2xl flex items-center gap-6 border border-white/10 group cursor-pointer hover:bg-slate-800 transition-colors">
          <i class="pi pi-compass text-raqeeb-azure group-hover:rotate-45 transition-transform duration-500"></i>
          <div>
             <span class="text-[9px] font-black uppercase tracking-[0.3em] block opacity-40">System Pulse</span>
             <span class="text-xs font-black uppercase tracking-widest italic tracking-tight">Geo-Spatial Integrity Locked</span>
          </div>
       </div>

       <div class="flex gap-4">
          <button class="w-16 h-16 bg-white rounded-2xl shadow-2xl flex items-center justify-center text-raqeeb-navy hover:text-raqeeb-azure active:scale-90 transition-all border border-slate-100"><i class="pi pi-plus text-xl"></i></button>
          <button class="w-16 h-16 bg-white rounded-2xl shadow-2xl flex items-center justify-center text-raqeeb-navy hover:text-raqeeb-azure active:scale-90 transition-all border border-slate-100"><i class="pi pi-minus text-xl"></i></button>
       </div>
    </div>
  </div>
</div>
